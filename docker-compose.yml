version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=sk-cd17e89639294f6991421c3c7d6ab480
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped